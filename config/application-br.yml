server:
  port: 8080
spring:
  application:
    name: greeting-service
  cloud:
    config:
      profile: br
management:
  endpoints:
    web:
      exposure:
        include:
          - '*'
  endpoint:
    health:
      show-details: always
greeting-service:
  greeting: "Ola"
  default-value: "Mundo"

